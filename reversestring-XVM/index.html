<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invertir cadena de texto</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6fb;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            background: #fff;
            padding: 2rem 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }
        .legend {
            font-weight: bold;
            color: #2a4d8f;
            background: #e3eaff;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.2rem;
            text-align: center;
        }
        label {
            width: 100%;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.7rem;
            font-size: 1.1rem;
            border: 1px solid #bfcbe3;
            border-radius: 0.4rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.7rem;
            background: #2a4d8f;
            color: #fff;
            border: none;
            border-radius: 0.4rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 1.2rem;
            transition: background 0.2s;
        }
        button:focus, button:hover {
            background: #18305c;
        }
        .result-label {
            font-weight: 500;
            margin-bottom: 0.3rem;
            color: #2a4d8f;
            width: 100%;
        }
        input[readonly] {
            background: #f0f3fa;
            color: #333;
        }
        @media (max-width: 500px) {
            .container {
                padding: 1rem 0.5rem;
                max-width: 98vw;
            }
        }
    </style>
</head>
<body>
    <main class="container" role="main">
        <div class="legend" id="input-legend">Introduzca el texto a invertir</div>
        <input type="text" id="inputText" aria-label="Texto a invertir" autocomplete="off" spellcheck="false" />
        <button id="invertBtn" type="button">Invertir</button>
        <div id="alert" role="alert" aria-live="assertive" style="color:#b00020;min-height:1.5em;margin-bottom:0.5em;font-size:1rem;"></div>
        <div class="result-label" id="result-legend">Resultado</div>
        <div style="display:flex;gap:0.5em;width:100%;align-items:center;">
            <input type="text" id="resultText" aria-label="Resultado" readonly tabindex="-1" style="flex:1;" />
            <button id="copyBtn" type="button" aria-label="Copiar resultado" title="Copiar" style="flex-basis:20%;max-width:20%;min-width:2.2em;min-height:2.2em;padding:0;display:flex;align-items:center;justify-content:center;background:#2a4d8f;color:#fff;border:none;border-radius:0.4em;" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <rect x="9" y="9" width="13" height="13" rx="2" stroke="#fff" stroke-width="2"/>
                    <rect x="3" y="3" width="13" height="13" rx="2" fill="#fff" stroke="#fff" stroke-width="2"/>
                    <rect x="3.5" y="3.5" width="12" height="12" rx="1.5" stroke="#2a4d8f" stroke-width="1.5"/>
                </svg>
            </button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
